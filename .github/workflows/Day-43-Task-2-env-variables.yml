name: env-variables
on:
    push:
        branches: [main]
    
env:
    APP_NAME: myapp

jobs:
    show-environment:
        runs-on: ubuntu-latest

        env:
            ENVIRONMENT: staging
        
        steps:
            - name: Printing Environment Variable
              env:
                VERSION: 1.0.0
              run: |
                echo "App Name: $APP_NAME"
                echo "Environment: $ENVIRONMENT"
                echo "Verion: $VERSION"
                
            - name: Print GitHub Context Variables
              run: |
                echo "Commit SHA: $GITHUB_SHA"
                echo "Triggered by: $GITHUB_ACTOR"
