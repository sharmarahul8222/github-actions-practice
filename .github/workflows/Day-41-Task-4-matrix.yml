name: Matrix Build

on:
    push:
        branches: [main]

jobs:
    martix-build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12"]
    
        steps: 
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{matrix.python-version}}

            - name: Python Version
              run: python --version
